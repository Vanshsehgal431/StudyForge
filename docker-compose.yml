version: "3.9"

services:
  server:
    build: ./server

    container_name: studyforge-server

    ports:
      - "5000:5000"

    env_file:
      - ./server/.env

    restart: unless-stopped

  client:
    build: ./client

    container_name: studyforge-client

    ports:
      - "5173:5173"

    depends_on:
      - server

    restart: unless-stopped